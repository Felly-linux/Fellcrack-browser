# 🛡️ OPSEC BROWSER - Privacy Flags Configuration

[privacy_flags]
# Base flags for all modes
base_flags=--disable-component-extensions-with-background-pages --disable-default-apps --disable-sync --no-first-run

# Privacy mode flags (DNS-HTTPS + anti-fingerprint)
privacy_flags=--enable-strict-mixed-content-checking --block-all-mixed-content --disable-device-discovery-notifications

# OPSEC mode flags (maximum privacy)
opsec_flags=--disable-plugins --enable-strict-mixed-content-checking --block-all-mixed-content --no-service-autorun

[tor_config]
tor_host=127.0.0.1
tor_port=9050
tor_verify_ssl=false

[dns_config]
# DNS over HTTPS providers
dns_providers=1.1.1.2,1.0.0.2,9.9.9.9

[profiles]
# Isolated profiles for different use cases
available_profiles=default,banking,work,research,personal

[extensions]
# Recommended extensions (manually install)
privacy_extensions=uBlock Origin,Privacy Badger,Decentraleyes
